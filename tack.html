<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Tack"/>
<title>Tack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#ffffff;--bg2:#f7f8fa;--bg3:#eef0f4;--bg4:#e4e7ed;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#1a1d24;--text2:rgba(26,29,36,0.6);--text3:rgba(26,29,36,0.38);
  --accent:#3b7cff;--accent2:#6c4ff7;--green:#1dac6e;
  --red:#e03e3e;--orange:#d97706;--yellow:#b45309;
  --sidebar-w:270px;--radius:14px;--radius-sm:10px;
  --font:'Lato',sans-serif;--font-head:'Lora',serif;--font-mono:'JetBrains Mono',monospace;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.11);
  --shadow-xl:0 20px 60px rgba(0,0,0,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;width:100%;overflow:hidden;}
body{background:var(--bg);font-family:var(--font);color:var(--text);font-size:16px;}
input,textarea,select{font-family:var(--font);font-size:16px;outline:none;color:var(--text);}
button{font-family:var(--font);cursor:pointer;transition:all 0.15s;-webkit-appearance:none;}
button:active{transform:scale(0.97);}
textarea{resize:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:4px;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.5;}

.app{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* ── AUTH SCREENS ── */
.auth-wrap{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#f0f4ff 0%,#fafafa 50%,#f5f0ff 100%);
  padding:20px;
}
.auth-card{
  background:#fff;border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:440px;
  box-shadow:var(--shadow-xl);animation:slideUp 0.25s ease;
}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.auth-logo-icon{flex-shrink:0;}
.auth-logo-text{}
.auth-logo-name{font-family:var(--font-head);font-size:26px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;}
.auth-logo-tag{font-family:var(--font-mono);font-size:9px;color:var(--accent);letter-spacing:2.5px;margin-top:3px;}
.auth-logo-desc{font-family:var(--font-head);font-size:10px;color:var(--text);font-style:italic;margin-top:2px;opacity:0.55;}
.auth-title{font-family:var(--font-head);font-size:22px;color:var(--text);margin-bottom:6px;}
.auth-sub{color:var(--text3);font-size:14px;margin-bottom:28px;line-height:1.5;}
.auth-step-indicator{display:flex;gap:8px;margin-bottom:28px;}
.auth-step{height:4px;border-radius:2px;flex:1;background:var(--bg3);transition:background 0.3s;}
.auth-step.active{background:var(--accent);}
.auth-step.done{background:var(--green);}
.auth-field{margin-bottom:16px;}
.auth-label{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:block;}
.auth-input{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px 16px;font-size:16px;color:var(--text);transition:border-color 0.15s;}
.auth-input:focus{border-color:var(--accent);background:#fff;}
.auth-input::placeholder{color:var(--text3);}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius-sm);color:#fff;font-size:16px;font-weight:700;padding:15px;margin-top:8px;box-shadow:0 4px 16px rgba(59,124,255,0.3);}
.auth-btn:disabled{opacity:0.45;cursor:not-allowed;}
.auth-link{background:none;border:none;color:var(--accent);font-size:14px;text-decoration:underline;padding:0;}
.auth-footer{text-align:center;margin-top:20px;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
.auth-error{background:rgba(224,62,62,0.08);border:1px solid rgba(224,62,62,0.25);border-radius:var(--radius-sm);padding:11px 14px;color:var(--red);font-size:14px;margin-bottom:16px;}
.auth-success{background:rgba(29,172,110,0.08);border:1px solid rgba(29,172,110,0.25);border-radius:var(--radius-sm);padding:11px 14px;color:var(--green);font-size:14px;margin-bottom:16px;}

/* Pending screen */
.pending-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg2);padding:20px;}
.pending-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow-xl);}
.pending-icon{font-size:52px;margin-bottom:20px;}
.pending-title{font-family:var(--font-head);font-size:24px;color:var(--text);margin-bottom:10px;}
.pending-sub{color:var(--text2);font-size:15px;line-height:1.6;margin-bottom:24px;}

/* Folder picker in signup */
.folder-picker{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
.folder-pick-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;}
.folder-pick-row.selected{border-color:var(--accent);background:rgba(59,124,255,0.06);}
.folder-pick-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.folder-pick-row.selected .folder-pick-check{background:var(--accent);border-color:var(--accent);color:#fff;font-size:12px;}

/* ── MAIN APP ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.tack-logo{display:flex;align-items:center;gap:12px;}
.tack-name{font-family:var(--font-head);font-size:26px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;}
.tack-tagline{font-family:var(--font-mono);font-size:9px;color:var(--accent);letter-spacing:2px;margin-top:3px;}
.tack-descriptor{font-family:var(--font-head);font-size:10px;color:var(--text);font-style:italic;margin-top:2px;opacity:0.55;}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:2px;}
.section-row{display:flex;align-items:center;justify-content:space-between;padding:10px 10px 4px;}
.section-label{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.add-btn{background:none;border:none;color:var(--accent);font-size:20px;padding:0 4px;line-height:1;}
.nav-btn{width:100%;background:transparent;border:none;border-radius:var(--radius-sm);padding:11px 12px;color:var(--text2);font-size:15px;font-weight:400;display:flex;align-items:center;gap:8px;text-align:left;}
.nav-btn:hover{background:rgba(0,0,0,0.04);color:var(--text);}
.nav-btn span:last-child{margin-left:auto;font-size:12px;font-weight:700;border-radius:20px;padding:2px 8px;background:rgba(0,0,0,0.06);color:var(--text2);}
.folder-row{display:flex;align-items:center;border-radius:var(--radius-sm);transition:background 0.15s;position:relative;}
.folder-row:hover{background:rgba(0,0,0,0.04);}
.folder-row:hover .folder-acts{opacity:1;}
.folder-row.active{background:rgba(59,124,255,0.08);}
.folder-main{flex:1;display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;min-width:0;}
.folder-name{flex:1;font-size:15px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-row.active .folder-name{font-weight:700;}
.folder-badge{font-size:12px;font-weight:700;border-radius:20px;padding:2px 8px;background:rgba(0,0,0,0.06);color:var(--text2);white-space:nowrap;flex-shrink:0;}
.folder-acts{opacity:0;display:flex;gap:2px;padding-right:8px;transition:opacity 0.15s;}
.fol-btn{background:none;border:none;font-size:13px;padding:4px 6px;border-radius:6px;color:var(--text3);}
.fol-btn:hover{background:rgba(0,0,0,0.08);color:var(--text2);}
.fol-btn.del:hover{color:var(--red);}
.sidebar-bottom{padding:12px 10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.user-box{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.user-name{flex:1;font-size:13px;font-weight:700;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-company{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.user-menu-btn{background:none;border:none;color:var(--text3);font-size:16px;padding:0;}
.cloud-badge{background:rgba(29,172,110,0.07);border:1px solid rgba(29,172,110,0.18);border-radius:var(--radius-sm);padding:8px 12px;}
.cloud-title{color:var(--green);font-family:var(--font-mono);font-size:10px;font-weight:700;}
.cloud-sub{color:var(--text3);font-family:var(--font-mono);font-size:10px;margin-top:2px;}

/* ── MAIN CONTENT ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{font-family:var(--font-head);font-size:22px;color:var(--text);flex:1;}
.topbar-sub{color:var(--text3);font-size:13px;margin-top:1px;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;min-width:200px;}
.search-wrap input{background:transparent;border:none;color:var(--text);font-size:15px;width:100%;}
.search-wrap input::placeholder{color:var(--text3);}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;padding:11px 20px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(59,124,255,0.25);white-space:nowrap;}
.btn-secondary{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:15px;padding:11px 18px;}
.btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;padding:11px 20px;}
.btn-ghost{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:14px;padding:8px 14px;}
.btn-filter{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:15px;padding:11px 16px;display:flex;align-items:center;gap:8px;}
.btn-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);flex-shrink:0;}
.btn-icon:hover{background:var(--bg3);}
.btn-icon.edit{background:rgba(59,124,255,0.08);border-color:rgba(59,124,255,0.2);color:var(--accent);}
.btn-icon.del{background:rgba(224,62,62,0.06);border-color:rgba(224,62,62,0.18);color:rgba(224,62,62,0.7);}
.btn-icon.share{background:rgba(29,172,110,0.08);border-color:rgba(29,172,110,0.2);color:var(--green);}

/* Notes */
.notes-list{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px;}
.note-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.2s;}
.note-card:hover{box-shadow:var(--shadow-lg);}
.note-card.shared-card{border-color:rgba(29,172,110,0.25);}
.note-summary{padding:15px 17px;cursor:pointer;display:flex;align-items:flex-start;gap:11px;}
.note-chevron{color:var(--text3);font-size:11px;margin-top:5px;flex-shrink:0;transition:transform 0.2s;}
.note-chevron.open{transform:rotate(90deg);}
.note-meta{flex:1;min-width:0;}
.note-tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px;}
.tag{font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;font-family:var(--font-mono);}
.note-topic{color:var(--text);font-size:17px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-preview{color:var(--text3);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-actions{display:flex;gap:6px;flex-shrink:0;}
.note-body{border-top:1px solid var(--border);padding:16px 18px;background:var(--bg2);}
.note-body-label{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.note-body-text{color:rgba(26,29,36,0.85);font-size:16px;line-height:1.8;white-space:pre-wrap;}
.note-footer{color:var(--text3);font-size:11px;font-family:var(--font-mono);margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.move-panel{padding:11px 17px;border-top:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:var(--bg2);}

/* Follow-ups */
.fu-badge{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--radius-sm);margin-bottom:7px;flex-wrap:wrap;}
.fu-check{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid;cursor:pointer;background:transparent;}
.fu-text{flex:1;font-size:15px;line-height:1.4;}
.fu-person{font-size:13px;border-radius:6px;padding:3px 10px;white-space:nowrap;}
.fu-deadline{font-size:12px;font-family:var(--font-mono);border-radius:6px;padding:3px 10px;white-space:nowrap;}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:#fff;border:1px solid var(--border);border-radius:18px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.18);animation:slideUp 0.22s ease;}
.modal-sm{max-width:480px;}
.modal-md{max-width:560px;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-family:var(--font-head);font-size:20px;color:var(--text);}
.modal-sub{color:var(--text3);font-size:13px;margin-top:2px;font-family:var(--font-mono);}
.modal-body{padding:20px 24px;}
.modal-footer{padding:0 24px 20px;display:flex;justify-content:flex-end;gap:10px;}
.modal-close{background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);width:34px;height:34px;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Form */
.form-row{display:flex;gap:14px;margin-bottom:16px;}
.form-field{margin-bottom:16px;}
.form-field.flex1{flex:1;margin-bottom:0;}
.form-field.flex2{flex:2;margin-bottom:0;}
.field-label{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:block;}
.field-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px 15px;font-size:16px;color:var(--text);transition:border-color 0.15s;}
.field-input:focus{border-color:var(--accent);background:#fff;}
.field-input::placeholder{color:var(--text3);}
.field-textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:15px;font-size:16px;color:var(--text);line-height:1.8;min-height:200px;transition:border-color 0.15s;}
.field-textarea:focus{border-color:var(--accent);background:#fff;}
.field-textarea::placeholder{color:var(--text3);}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;}
.cat-pill{border-radius:24px;padding:8px 16px;font-size:14px;border:1.5px solid;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;white-space:nowrap;}
.fu-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.fu-add-btn{background:rgba(29,172,110,0.1);border:1px solid rgba(29,172,110,0.25);border-radius:var(--radius-sm);color:var(--green);font-size:14px;font-weight:700;padding:7px 14px;}
.fu-empty{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:18px;text-align:center;color:var(--text3);font-size:14px;}
.fu-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}

/* Color/icon pickers */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;flex-shrink:0;}
.color-swatch.sel{border-color:var(--text);transform:scale(1.15);}
.icon-picker{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.icon-opt{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.icon-opt.sel{border-color:var(--accent);background:rgba(59,124,255,0.1);}

/* Account settings panel */
.settings-panel{flex:1;overflow-y:auto;padding:20px 24px;}
.settings-section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow);}
.settings-section-title{font-family:var(--font-head);font-size:17px;color:var(--text);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;padding-bottom:0;}
.settings-row-label{font-size:14px;font-weight:700;color:var(--text);}
.settings-row-value{font-size:14px;color:var(--text2);}
.settings-edit-btn{background:rgba(59,124,255,0.08);border:1px solid rgba(59,124,255,0.2);border-radius:8px;color:var(--accent);font-size:13px;font-weight:700;padding:6px 14px;}

/* Admin panel */
.admin-table{width:100%;border-collapse:collapse;}
.admin-table th{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;}
.admin-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);}
.admin-table tr:last-child td{border-bottom:none;}
.status-badge{font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;font-family:var(--font-mono);}
.status-badge.approved{background:rgba(29,172,110,0.1);color:var(--green);}
.status-badge.pending{background:rgba(180,83,9,0.1);color:var(--yellow);}
.approve-btn{background:rgba(29,172,110,0.1);border:1px solid rgba(29,172,110,0.25);border-radius:8px;color:var(--green);font-size:13px;font-weight:700;padding:5px 13px;}
.revoke-btn{background:rgba(224,62,62,0.08);border:1px solid rgba(224,62,62,0.2);border-radius:8px;color:var(--red);font-size:13px;font-weight:700;padding:5px 13px;}
.invite-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.invite-link{flex:1;font-family:var(--font-mono);font-size:12px;color:var(--text2);word-break:break-all;}

/* Share modal */
.user-search-result{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;}
.user-search-result:hover{border-color:var(--accent);background:rgba(59,124,255,0.04);}
.user-result-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(29,172,110,0.95);color:#fff;border-radius:var(--radius-sm);padding:11px 22px;font-size:15px;font-weight:700;z-index:400;box-shadow:0 4px 20px rgba(29,172,110,0.35);display:flex;align-items:center;gap:7px;pointer-events:none;animation:toastAnim 2.5s ease forwards;}

/* Delete preview */
.delete-preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin:12px 0;}

/* Dropdown menu */
.dropdown{position:absolute;bottom:56px;left:10px;right:10px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:100;overflow:hidden;animation:slideUp 0.15s ease;}
.dropdown-item{width:100%;background:none;border:none;padding:12px 16px;text-align:left;font-size:14px;color:var(--text);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:var(--bg2);}
.dropdown-item.danger{color:var(--red);}

@keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-8px);}}
.fade-in{animation:fadeIn 0.18s ease;}

const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=s=>{if(!s)return"—";return new Date(s+"T12:00:00").toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});};

const daysDiff=s=>{if(!s)return null;const d=new Date(s+"T12:00:00"),n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000);};
const uColor=d=>{if(d===null)return"#888";if(d<0)return"#e03e3e";if(d===0)return"#d97706";if(d<=3)return"#b45309";return"#1dac6e";};
const uLabel=d=>{if(d===null)return"No deadline";if(d<0)return`${Math.abs(d)}d overdue`;if(d===0)return"Due today";if(d===1)return"Due tomorrow";return`${d}d left`;};
const initials=name=>{if(!name)return"?";return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();};
