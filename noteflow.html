<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NoteFlow"/>
<meta name="theme-color" content="#0a0c12"/>
<title>NoteFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;}
body{background:#0a0c12;font-family:'DM Sans',sans-serif;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:3px;}
textarea,input{outline:none;font-family:'DM Sans',sans-serif;}
button{transition:transform 0.1s;cursor:pointer;}
button:active{transform:scale(0.96);}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes toast{0%{opacity:0;transform:translateX(-50%) translateY(10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-8px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.modal{animation:slideUp 0.2s ease;}
.note-row{animation:fadeIn 0.18s ease;}
.toast-anim{animation:toast 2.5s ease forwards;}
.teams-pulse{animation:pulse 2s infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { createClient } = supabase;

const { useState, useRef, useEffect, useCallback } = React;

const MY_NAME_KEY  = "noteflow_myname";
const MY_EMAIL_KEY = "noteflow_myemail";

const CATS = [
  { id:"meetings", label:"Meetings", color:"#4F8EF7", icon:"👥" },
  { id:"clients",  label:"Clients",  color:"#F76E4F", icon:"🤝" },
  { id:"ideas",    label:"Ideas",    color:"#A04FF7", icon:"💡" },
  { id:"tasks",    label:"Tasks",    color:"#4FC68A", icon:"✅" },
  { id:"research", label:"Research", color:"#F7C44F", icon:"🔍" },
  { id:"personal", label:"Personal", color:"#F74FA0", icon:"🌿" },
];

const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate  = s => { if(!s)return"—"; return new Date(s+"T12:00:00").toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"}); };
const fmtTime  = iso => { try{return new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}catch{return"";} };
const daysDiff = s => { if(!s)return null; const d=new Date(s+"T12:00:00"),n=new Date(); n.setHours(0,0,0,0); return Math.round((d-n)/86400000); };
const uColor   = d => { if(d===null)return"#888"; if(d<0)return"#FF4F4F"; if(d===0)return"#FF8C00"; if(d<=3)return"#FFD700"; return"#4FC68A"; };
const uLabel   = d => { if(d===null)return"No deadline"; if(d<0)return`${Math.abs(d)}d overdue`; if(d===0)return"Due today"; if(d===1)return"Due tomorrow"; return`${d}d left`; };
const loadStr  = k => { try{return localStorage.getItem(k)||"";}catch{return"";} };
const saveStr  = (k,v) => { try{localStorage.setItem(k,v);}catch{} };

const INP = { width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.11)", borderRadius:11, padding:"9px 13px", color:"#fff", fontSize:13 };
const LBL = { color:"rgba(255,255,255,0.35)", fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1, textTransform:"uppercase", marginBottom:6 };

function Label({c}){ return <div style={LBL}>{c}</div>; }
function Field({label,children,style={}}){ return <div style={{marginBottom:14,...style}}><Label c={label}/>{children}</div>; }

function CatPill({cat,selected,onClick}){
  return <button onClick={onClick} style={{background:selected?cat.color:"rgba(255,255,255,0.07)",border:`1.5px solid ${selected?cat.color:"rgba(255,255,255,0.12)"}`,color:selected?"#fff":"rgba(255,255,255,0.55)",borderRadius:22,padding:"5px 13px",fontSize:12,fontWeight:selected?700:400,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",boxShadow:selected?`0 2px 10px ${cat.color}44`:"none",transition:"all 0.15s"}}>{cat.icon} {cat.label}</button>;
}

function FUBadge({fu,myName,onToggle}){
  const days=daysDiff(fu.deadline),color=uColor(days);
  const isMe=myName&&fu.person.toLowerCase().includes(myName.toLowerCase());
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:fu.done?"rgba(255,255,255,0.02)":`${color}0d`,border:`1px solid ${fu.done?"rgba(255,255,255,0.06)":color+"33"}`,borderRadius:9,marginBottom:6,flexWrap:"wrap",opacity:fu.done?0.5:1}}>
      <button onClick={()=>onToggle(fu.id)} style={{width:18,height:18,borderRadius:5,flexShrink:0,background:fu.done?color:"transparent",border:`2px solid ${fu.done?color:"rgba(255,255,255,0.25)"}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>{fu.done?"✓":""}</button>
      <span style={{flex:1,color:fu.done?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.85)",fontSize:12,textDecoration:fu.done?"line-through":"none"}}>{fu.item}</span>
      {fu.person&&<span style={{background:isMe?"rgba(79,142,247,0.15)":"rgba(255,255,255,0.06)",border:`1px solid ${isMe?"rgba(79,142,247,0.3)":"rgba(255,255,255,0.1)"}`,color:isMe?"#4F8EF7":"rgba(255,255,255,0.45)",borderRadius:7,padding:"1px 8px",fontSize:11,fontWeight:isMe?700:400}}>{isMe?"👤 Me":`👤 ${fu.person}`}</span>}
      {fu.deadline&&<span style={{color:fu.done?"rgba(255,255,255,0.3)":color,fontSize:11,fontFamily:"'DM Mono',monospace",background:fu.done?"transparent":`${color}15`,border:`1px solid ${fu.done?"transparent":color+"30"}`,borderRadius:7,padding:"1px 8px",whiteSpace:"nowrap"}}>{uLabel(days)}</span>}
    </div>
  );
}

function FURow({fu,idx,onChange,onRemove}){
  return (
    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,padding:"11px 13px",marginBottom:8,display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}>
      <div style={{flex:"2 1 150px"}}><Label c="Action Item"/><input value={fu.item} onChange={e=>onChange(idx,"item",e.target.value)} placeholder="What needs to be done…" style={{...INP,fontSize:12,padding:"7px 10px"}}/></div>
      <div style={{flex:"1 1 110px"}}><Label c="Person"/><input value={fu.person} onChange={e=>onChange(idx,"person",e.target.value)} placeholder="Name…" style={{...INP,fontSize:12,padding:"7px 10px"}}/></div>
      <div style={{flex:"1 1 120px"}}><Label c="Deadline"/><input type="date" value={fu.deadline} onChange={e=>onChange(idx,"deadline",e.target.value)} style={{...INP,fontSize:12,padding:"7px 10px"}}/></div>
      <button onClick={()=>onRemove(idx)} style={{background:"rgba(255,60,60,0.1)",border:"1px solid rgba(255,60,60,0.2)",borderRadius:8,color:"rgba(255,90,90,0.7)",width:28,height:28,fontSize:14,flexShrink:0,alignSelf:"flex-end",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
    </div>
  );
}

function DeleteModal({note,onConfirm,onCancel}){
  const cat=CATS.find(c=>c.id===note.category);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",backdropFilter:"blur(14px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={e=>e.target===e.currentTarget&&onCancel()}>
      <div className="modal" style={{background:"#13161f",border:"1px solid rgba(255,80,80,0.25)",borderRadius:20,padding:"28px 26px",width:"100%",maxWidth:420,boxShadow:"0 24px 80px rgba(0,0,0,0.8)",textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(255,79,79,0.12)",border:"1px solid rgba(255,79,79,0.3)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",fontSize:22}}>🗑</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#fff",marginBottom:8}}>Delete this note?</div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderLeft:`3px solid ${cat?.color||"#888"}`,borderRadius:10,padding:"11px 14px",margin:"14px 0 20px",textAlign:"left"}}>
          {note.topic&&<div style={{color:"#fff",fontSize:13,fontWeight:600,marginBottom:4}}>{note.topic}</div>}
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {note.date&&<span style={{color:"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"'DM Mono',monospace"}}>📅 {fmtDate(note.date)}</span>}
            {note.people&&<span style={{color:"rgba(255,255,255,0.4)",fontSize:11}}>👤 {note.people}</span>}
          </div>
          {(note.follow_ups||[]).filter(f=>!f.done).length>0&&<div style={{marginTop:8,color:"#FFD700",fontSize:11,background:"rgba(255,200,0,0.08)",border:"1px solid rgba(255,200,0,0.2)",borderRadius:6,padding:"4px 9px",display:"inline-block"}}>⚠ {(note.follow_ups||[]).filter(f=>!f.done).length} open follow-up{(note.follow_ups||[]).filter(f=>!f.done).length>1?"s":""} will also be deleted</div>}
        </div>
        <div style={{color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:22,lineHeight:1.5}}>This cannot be undone.</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,color:"rgba(255,255,255,0.6)",padding:"11px",fontSize:14,fontWeight:600}}>Cancel</button>
          <button onClick={onConfirm} style={{flex:1,background:"linear-gradient(135deg,#c0392b,#e74c3c)",border:"none",borderRadius:12,color:"#fff",padding:"11px",fontSize:14,fontWeight:700,boxShadow:"0 4px 16px rgba(231,76,60,0.4)"}}>Delete Note</button>
        </div>
      </div>
    </div>
  );
}

function TeamsModal({note,onSave,onDismiss}){
  const [form,setForm]=useState({...note,follow_ups:[...(note.follow_ups||[])]});
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const updFU=(idx,k,v)=>setForm(f=>({...f,follow_ups:f.follow_ups.map((fu,i)=>i===idx?{...fu,[k]:v}:fu)}));
  const remFU=idx=>setForm(f=>({...f,follow_ups:f.follow_ups.filter((_,i)=>i!==idx)}));
  const addFU=()=>setForm(f=>({...f,follow_ups:[...f.follow_ups,{id:Date.now().toString(),item:"",person:"",deadline:"",done:false}]}));
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",backdropFilter:"blur(14px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:150,padding:14}} onClick={e=>e.target===e.currentTarget&&onDismiss()}>
      <div className="modal" style={{background:"#13161f",border:"1px solid rgba(79,142,247,0.3)",borderRadius:22,padding:"22px 24px",width:"100%",maxWidth:620,boxShadow:"0 28px 90px rgba(0,0,0,0.85)",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{width:38,height:38,borderRadius:10,background:"rgba(79,142,247,0.15)",border:"1px solid rgba(79,142,247,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>💼</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#fff"}}>Teams Meeting Imported</div>
            <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:1,fontFamily:"'DM Mono',monospace"}}>Review and confirm before saving to NoteFlow</div>
          </div>
          <button onClick={onDismiss} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"rgba(255,255,255,0.4)",width:30,height:30,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{background:"rgba(79,142,247,0.08)",border:"1px solid rgba(79,142,247,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:18,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16}}>🔵</span>
          <div>
            <div style={{color:"#4F8EF7",fontSize:12,fontWeight:700}}>Auto-imported from Microsoft Teams</div>
            <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:1}}>Summary, attendees and action items pulled automatically. Review and edit anything before saving.</div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,marginBottom:14}}>
          <Field label="📅 Date" style={{flex:1,marginBottom:0}}><input type="date" value={form.date||""} onChange={e=>sf("date",e.target.value)} style={INP}/></Field>
          <Field label="👤 Attendees" style={{flex:2,marginBottom:0}}><input value={form.people||""} onChange={e=>sf("people",e.target.value)} style={INP}/></Field>
        </div>
        <Field label="💬 Meeting Title"><input value={form.topic||""} onChange={e=>sf("topic",e.target.value)} style={INP}/></Field>
        <Field label="📝 Teams AI Summary"><textarea value={form.body||""} onChange={e=>sf("body",e.target.value)} style={{...INP,minHeight:110,lineHeight:1.7,resize:"vertical"}}/></Field>
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Label c="✅ Action Items from Teams"/>
            <button onClick={addFU} style={{background:"rgba(79,198,138,0.12)",border:"1px solid rgba(79,198,138,0.25)",borderRadius:8,color:"#4FC68A",padding:"4px 12px",fontSize:12}}>+ Add Item</button>
          </div>
          {(form.follow_ups||[]).length===0?<div style={{border:"1px dashed rgba(255,255,255,0.1)",borderRadius:11,padding:"14px",textAlign:"center",color:"rgba(255,255,255,0.22)",fontSize:12}}>No action items from Teams — add manually if needed</div>
          :(form.follow_ups||[]).map((fu,idx)=><FURow key={fu.id} fu={fu} idx={idx} onChange={updFU} onRemove={remFU}/>)}
        </div>
        <Field label="📁 Folder"><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{CATS.map(cat=><CatPill key={cat.id} cat={cat} selected={form.category===cat.id} onClick={()=>sf("category",cat.id)}/>)}</div></Field>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button onClick={onDismiss} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,color:"rgba(255,255,255,0.45)",padding:"9px 17px",fontSize:13}}>Dismiss</button>
          <button onClick={()=>onSave(form)} style={{flex:1,background:"linear-gradient(135deg,#4F8EF7,#7B5CF7)",border:"none",borderRadius:11,color:"#fff",padding:"11px 21px",fontSize:13,fontWeight:700,boxShadow:"0 4px 14px rgba(79,142,247,0.3)"}}>✓ Save to NoteFlow</button>
        </div>
      </div>
    </div>
  );
}

function NoteCard({note,onDelete,onMove,onToggleFU,onEdit,myName}){
  const cat=CATS.find(c=>c.id===note.category);
  const [expanded,setExpanded]=useState(false);
  const [showMove,setShowMove]=useState(false);
  const openFUs=(note.follow_ups||[]).filter(f=>!f.done);
  const overdue=openFUs.filter(f=>f.deadline&&daysDiff(f.deadline)<0);
  const isTeams=note.source==="teams";
  return (
    <div className="note-row" style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${isTeams?"rgba(79,142,247,0.2)":"rgba(255,255,255,0.08)"}`,borderLeft:`3px solid ${cat?.color||"#888"}`,borderRadius:15,marginBottom:9,overflow:"hidden"}}>
      <div onClick={()=>setExpanded(e=>!e)} style={{padding:"12px 15px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:10}}>
        <div style={{color:"rgba(255,255,255,0.22)",fontSize:10,marginTop:3,flexShrink:0,transition:"transform 0.2s",transform:expanded?"rotate(90deg)":"rotate(0deg)"}}>▶</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginBottom:4}}>
            <span style={{background:`${cat?.color}22`,border:`1px solid ${cat?.color}44`,color:cat?.color,borderRadius:7,padding:"2px 8px",fontSize:10,fontWeight:700}}>{cat?.icon} {cat?.label}</span>
            {isTeams&&<span style={{background:"rgba(79,142,247,0.12)",border:"1px solid rgba(79,142,247,0.25)",color:"#4F8EF7",borderRadius:7,padding:"2px 8px",fontSize:10,fontWeight:700}}>🔵 Teams</span>}
            {note.date&&<span style={{color:"rgba(255,255,255,0.45)",fontSize:11,fontFamily:"'DM Mono',monospace"}}>📅 {fmtDate(note.date)}</span>}
            {note.people&&<span style={{color:"rgba(255,255,255,0.45)",fontSize:11}}>👤 {note.people}</span>}
            {overdue.length>0&&<span style={{background:"rgba(255,79,79,0.15)",border:"1px solid rgba(255,79,79,0.35)",color:"#FF4F4F",borderRadius:7,padding:"2px 8px",fontSize:10,fontWeight:700}}>⚠ {overdue.length} overdue</span>}
            {openFUs.length>0&&overdue.length===0&&<span style={{background:"rgba(255,200,0,0.1)",border:"1px solid rgba(255,200,0,0.25)",color:"#FFD700",borderRadius:7,padding:"2px 8px",fontSize:10,fontWeight:700}}>⏳ {openFUs.length} open</span>}
            {note.edited_at&&<span style={{color:"rgba(255,255,255,0.2)",fontSize:10,fontFamily:"'DM Mono',monospace"}}>edited {fmtDate(note.edited_at.slice(0,10))}</span>}
          </div>
          {note.topic&&<div style={{color:"#fff",fontSize:13,fontWeight:600,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{note.topic}</div>}
          {!expanded&&note.body&&<div style={{color:"rgba(255,255,255,0.38)",fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{note.body}</div>}
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();onEdit(note);}} style={{background:"rgba(79,142,247,0.1)",border:"1px solid rgba(79,142,247,0.22)",borderRadius:7,color:"#4F8EF7",width:27,height:27,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>✎</button>
          <button onClick={e=>{e.stopPropagation();setShowMove(s=>!s);}} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"rgba(255,255,255,0.4)",width:27,height:27,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>📁</button>
          <button onClick={e=>{e.stopPropagation();onDelete(note);}} style={{background:"rgba(255,60,60,0.08)",border:"1px solid rgba(255,60,60,0.2)",borderRadius:7,color:"rgba(255,90,90,0.6)",width:27,height:27,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🗑</button>
        </div>
      </div>
      {expanded&&(
        <div style={{borderTop:"1px solid rgba(255,255,255,0.055)",padding:"12px 15px 14px"}}>
          {note.body&&<div style={{marginBottom:14}}><Label c={isTeams?"Teams AI Summary":"Notes"}/><p style={{color:"rgba(255,255,255,0.8)",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",margin:0}}>{note.body}</p></div>}
          {(note.follow_ups||[]).length>0&&<div><Label c="Follow-ups & To-Dos"/>{(note.follow_ups||[]).map(fu=><FUBadge key={fu.id} fu={fu} myName={myName} onToggle={fid=>onToggleFU(note.id,fid)}/>)}</div>}
          <div style={{color:"rgba(255,255,255,0.18)",fontSize:10,fontFamily:"'DM Mono',monospace",marginTop:10}}>{isTeams?"Imported":"Created"} {fmtDate(note.created_at?.slice(0,10))} at {fmtTime(note.created_at)}{note.edited_at&&` · Edited ${fmtDate(note.edited_at.slice(0,10))}`}</div>
        </div>
      )}
      {showMove&&(
        <div style={{padding:"9px 15px 11px",borderTop:"1px solid rgba(255,255,255,0.055)",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{color:"rgba(255,255,255,0.28)",fontSize:11}}>Move to:</span>
          {CATS.filter(c=>c.id!==note.category).map(c=><button key={c.id} onClick={()=>{onMove(note.id,c.id);setShowMove(false);}} style={{background:`${c.color}18`,border:`1px solid ${c.color}40`,color:c.color,borderRadius:9,padding:"3px 10px",fontSize:11}}>{c.icon} {c.label}</button>)}
        </div>
      )}
    </div>
  );
}

function NoteModal({initial,onSave,onClose}){
  const isEdit=!!initial?.id;
  const nFU=()=>({id:Date.now().toString()+Math.random(),item:"",person:"",deadline:"",done:false});
  const [form,setForm]=useState(initial?{...initial,follow_ups:[...(initial.follow_ups||[])]}:{date:todayStr(),people:"",topic:"",body:"",category:CATS[0].id,follow_ups:[]});
  const bodyRef=useRef(null);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.focus();},[]);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addFU=()=>setForm(f=>({...f,follow_ups:[...f.follow_ups,nFU()]}));
  const updFU=(idx,k,v)=>setForm(f=>({...f,follow_ups:f.follow_ups.map((fu,i)=>i===idx?{...fu,[k]:v}:fu)}));
  const remFU=idx=>setForm(f=>({...f,follow_ups:f.follow_ups.filter((_,i)=>i!==idx)}));
  const ok=form.body.trim()||form.topic.trim();
  const doSave=()=>ok&&onSave({...form,follow_ups:form.follow_ups.filter(fu=>fu.item.trim())});
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:14}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{background:"#13161f",border:"1px solid rgba(255,255,255,0.09)",borderRadius:22,padding:"22px 24px",width:"100%",maxWidth:600,boxShadow:"0 28px 90px rgba(0,0,0,0.78)",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#fff"}}>{isEdit?"Edit Note":"New Note"}</div>
            <div style={{color:"rgba(255,255,255,0.28)",fontSize:10,marginTop:1,fontFamily:"'DM Mono',monospace"}}>{isEdit?`Created ${fmtDate((form.created_at||"").slice(0,10))}`:"All fields optional except notes or topic"}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"rgba(255,255,255,0.4)",width:30,height:30,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:12,marginBottom:14}}>
          <Field label="📅 Date" style={{flex:1,marginBottom:0}}><input type="date" value={form.date||""} onChange={e=>sf("date",e.target.value)} style={INP}/></Field>
          <Field label="👤 People Involved" style={{flex:2,marginBottom:0}}><input value={form.people||""} onChange={e=>sf("people",e.target.value)} placeholder="e.g. Sarah Chen, Mike Torres…" style={INP}/></Field>
        </div>
        <Field label="💬 Topic of Discussion"><input value={form.topic||""} onChange={e=>sf("topic",e.target.value)} placeholder="e.g. Q3 Budget Review…" style={INP}/></Field>
        <Field label="📝 Notes"><textarea ref={bodyRef} value={form.body||""} onChange={e=>sf("body",e.target.value)} placeholder="Write your notes… (Apple Pencil Scribble or keyboard)" onKeyDown={e=>{if(e.key==="Enter"&&e.metaKey)doSave();}} style={{...INP,minHeight:100,lineHeight:1.7,resize:"vertical"}}/></Field>
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Label c="✅ Follow-ups & To-Dos"/>
            <button onClick={addFU} style={{background:"rgba(79,198,138,0.12)",border:"1px solid rgba(79,198,138,0.25)",borderRadius:8,color:"#4FC68A",padding:"4px 12px",fontSize:12}}>+ Add Item</button>
          </div>
          {form.follow_ups.length===0?<div style={{border:"1px dashed rgba(255,255,255,0.1)",borderRadius:11,padding:"14px",textAlign:"center",color:"rgba(255,255,255,0.22)",fontSize:12}}>Tap "+ Add Item" to log follow-up actions</div>:form.follow_ups.map((fu,idx)=><FURow key={fu.id} fu={fu} idx={idx} onChange={updFU} onRemove={remFU}/>)}
        </div>
        <Field label="📁 Assign to Folder"><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{CATS.map(cat=><CatPill key={cat.id} cat={cat} selected={form.category===cat.id} onClick={()=>sf("category",cat.id)}/>)}</div></Field>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,color:"rgba(255,255,255,0.45)",padding:"9px 17px",fontSize:13}}>Cancel</button>
          <button onClick={doSave} disabled={!ok} style={{background:ok?"linear-gradient(135deg,#4F8EF7,#7B5CF7)":"rgba(255,255,255,0.07)",border:"none",borderRadius:11,color:ok?"#fff":"rgba(255,255,255,0.25)",cursor:ok?"pointer":"not-allowed",padding:"9px 21px",fontSize:13,fontWeight:700,boxShadow:ok?"0 4px 14px rgba(79,142,247,0.3)":"none",transition:"all 0.18s"}}>{isEdit?"Save Changes →":"Save Note →"}</button>
        </div>
      </div>
    </div>
  );
}

function AccountPanel({notes,myName,onToggleFU}){
  const all=notes.flatMap(n=>(n.follow_ups||[]).map(f=>({...f,noteId:n.id,noteTopic:n.topic})));
  const isMe=p=>myName&&p.toLowerCase().includes(myName.toLowerCase());
  const myOpen=all.filter(f=>!f.done&&isMe(f.person));
  const othOpen=all.filter(f=>!f.done&&f.person&&!isMe(f.person));
  const Item=({fu})=>{const days=daysDiff(fu.deadline),col=uColor(days);return(
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",marginBottom:6,background:`${col}0d`,border:`1px solid ${col}30`,borderRadius:10,flexWrap:"wrap"}}>
      <button onClick={()=>onToggleFU(fu.noteId,fu.id)} style={{width:17,height:17,borderRadius:4,flexShrink:0,background:"transparent",border:`2px solid ${col}`}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:"rgba(255,255,255,0.85)",fontSize:12}}>{fu.item}</div>
        {fu.noteTopic&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:10,fontFamily:"'DM Mono',monospace",marginTop:1}}>from: {fu.noteTopic}</div>}
      </div>
      {fu.person&&!isMe(fu.person)&&<span style={{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.45)",borderRadius:6,padding:"1px 7px",fontSize:10}}>👤 {fu.person}</span>}
      {fu.deadline&&<span style={{color:col,fontSize:10,fontFamily:"'DM Mono',monospace",background:`${col}15`,border:`1px solid ${col}28`,borderRadius:6,padding:"1px 7px",whiteSpace:"nowrap"}}>{uLabel(days)}</span>}
    </div>
  );};
  const Sec=({title,items,color})=>items.length===0?null:(
    <div style={{marginBottom:14}}>
      <div style={{color:color,fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",letterSpacing:0.5,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>{title}<span style={{background:`${color}20`,border:`1px solid ${color}40`,borderRadius:999,padding:"0px 7px",fontSize:10}}>{items.length}</span></div>
      {items.map(fu=><Item key={fu.id} fu={fu}/>)}
    </div>
  );
  const myOver=myOpen.filter(f=>f.deadline&&daysDiff(f.deadline)<0);
  const myToday=myOpen.filter(f=>f.deadline&&daysDiff(f.deadline)===0);
  const myUp=myOpen.filter(f=>!f.deadline||daysDiff(f.deadline)>0);
  const oOver=othOpen.filter(f=>f.deadline&&daysDiff(f.deadline)<0);
  const oToday=othOpen.filter(f=>f.deadline&&daysDiff(f.deadline)===0);
  const oUp=othOpen.filter(f=>!f.deadline||daysDiff(f.deadline)>0);
  return(
    <div style={{padding:"18px 22px",overflowY:"auto",flex:1}}>
      {myOpen.length===0&&othOpen.length===0?(<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",marginTop:50}}><div style={{fontSize:36,marginBottom:10}}>🎉</div><div style={{fontSize:14}}>All caught up!</div></div>):(
        <>
          {myOpen.length>0&&<div style={{background:"rgba(79,142,247,0.06)",border:"1px solid rgba(79,142,247,0.15)",borderRadius:14,padding:"14px 16px",marginBottom:18}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#4F8EF7",marginBottom:12}}>My Action Items</div><Sec title="⚠ OVERDUE" items={myOver} color="#FF4F4F"/><Sec title="🔥 DUE TODAY" items={myToday} color="#FF8C00"/><Sec title="📋 UPCOMING" items={myUp} color="#4F8EF7"/></div>}
          {othOpen.length>0&&<div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"14px 16px"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"rgba(255,255,255,0.7)",marginBottom:4}}>Others' Follow-ups</div><div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginBottom:12}}>Items others committed to — follow up if overdue</div><Sec title="⚠ OVERDUE — FOLLOW UP NOW" items={oOver} color="#FF4F4F"/><Sec title="🔥 DUE TODAY" items={oToday} color="#FF8C00"/><Sec title="📋 UPCOMING" items={oUp} color="#888"/></div>}
        </>
      )}
    </div>
  );
}

function App(){
  const [notes,setNotes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [myName,setMyName]=useState(()=>loadStr(MY_NAME_KEY));
  const [myEmail,setMyEmail]=useState(()=>loadStr(MY_EMAIL_KEY));
  const [editName,setEditName]=useState(!loadStr(MY_NAME_KEY));
  const [editEmail,setEditEmail]=useState(!loadStr(MY_EMAIL_KEY));
  const [folder,setFolder]=useState("all");
  const [view,setView]=useState("notes");
  const [modal,setModal]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const [teamsNote,setTeamsNote]=useState(null);
  const [teamsBadge,setTeamsBadge]=useState(0);
  const [toast,setToast]=useState("");
  const [sText,setSText]=useState("");
  const [sDate,setSDate]=useState("");
  const [sPeople,setSPeople]=useState("");
  const [sTopic,setSTopic]=useState("");
  const [showF,setShowF]=useState(false);

  const fetchNotes=useCallback(async()=>{
    setLoading(true);
    const{data,error}=await sb.from("notes").select("*").order("created_at",{ascending:false});
    if(!error){
      setNotes(data||[]);
      const pending=(data||[]).filter(n=>n.source==="teams"&&!n.teams_reviewed);
      setTeamsBadge(pending.length);
      if(pending.length>0&&!teamsNote)setTeamsNote(pending[0]);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{fetchNotes();},[fetchNotes]);
  useEffect(()=>{
    const iv=setInterval(async()=>{
      const{data}=await sb.from("notes").select("*").eq("source","teams").eq("teams_reviewed",false);
      if(data&&data.length>0){setTeamsBadge(data.length);if(!teamsNote)setTeamsNote(data[0]);}
    },30000);
    return()=>clearInterval(iv);
  },[teamsNote]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const handleSave=useCallback(async form=>{
    const isEdit=notes.some(n=>n.id===form.id);
    if(isEdit){
      const{error}=await sb.from("notes").update({date:form.date,people:form.people,topic:form.topic,body:form.body,category:form.category,follow_ups:form.follow_ups,edited_at:new Date().toISOString(),teams_reviewed:true}).eq("id",form.id);
      if(!error){showToast("✓ Note updated");fetchNotes();}else showToast("❌ Error saving");
    }else{
      const{error}=await sb.from("notes").insert([{date:form.date,people:form.people,topic:form.topic,body:form.body,category:form.category,follow_ups:form.follow_ups,source:"manual"}]);
      if(!error){showToast("✓ Note saved to cloud");fetchNotes();}else showToast("❌ Error saving");
    }
    setModal(null);
  },[notes,fetchNotes]);

  const handleTeamsSave=useCallback(async form=>{
    const{error}=await sb.from("notes").update({date:form.date,people:form.people,topic:form.topic,body:form.body,category:form.category,follow_ups:form.follow_ups,teams_reviewed:true,edited_at:new Date().toISOString()}).eq("id",form.id);
    if(!error){showToast("✓ Teams meeting saved");setTeamsNote(null);fetchNotes();}
  },[fetchNotes]);

  const handleTeamsDismiss=useCallback(async()=>{
    if(teamsNote)await sb.from("notes").update({teams_reviewed:true}).eq("id",teamsNote.id);
    setTeamsNote(null);setTeamsBadge(0);fetchNotes();
  },[teamsNote,fetchNotes]);

  const confirmDelete=useCallback(async()=>{
    if(!delTarget)return;
    await sb.from("notes").delete().eq("id",delTarget.id);
    setNotes(p=>p.filter(n=>n.id!==delTarget.id));
    setDelTarget(null);showToast("🗑 Note deleted");
  },[delTarget]);

  const handleMove=useCallback(async(id,cat)=>{
    await sb.from("notes").update({category:cat}).eq("id",id);
    setNotes(p=>p.map(n=>n.id===id?{...n,category:cat}:n));
  },[]);

  const handleToggleFU=useCallback(async(noteId,fuId)=>{
    const note=notes.find(n=>n.id===noteId);if(!note)return;
    const upd=(note.follow_ups||[]).map(f=>f.id===fuId?{...f,done:!f.done}:f);
    await sb.from("notes").update({follow_ups:upd}).eq("id",noteId);
    setNotes(p=>p.map(n=>n.id!==noteId?n:{...n,follow_ups:upd}));
  },[notes]);

  const filtered=notes.filter(n=>{
    if(folder!=="all"&&n.category!==folder)return false;
    if(sDate&&n.date!==sDate)return false;
    if(sPeople&&!(n.people||"").toLowerCase().includes(sPeople.toLowerCase()))return false;
    if(sTopic&&!(n.topic||"").toLowerCase().includes(sTopic.toLowerCase()))return false;
    if(sText){const q=sText.toLowerCase();const ft=(n.follow_ups||[]).map(f=>`${f.item} ${f.person}`).join(" ");if(![n.body,n.topic,n.people,fmtDate(n.date),ft].some(s=>(s||"").toLowerCase().includes(q)))return false;}
    return true;
  });

  const allFUs=notes.flatMap(n=>(n.follow_ups||[]).map(f=>({...f})));
  const openCount=allFUs.filter(f=>!f.done).length;
  const overdueCount=allFUs.filter(f=>!f.done&&f.deadline&&daysDiff(f.deadline)<0).length;
  const cc=id=>notes.filter(n=>n.category===id).length;

  const SBBtn=({onClick,active,color,label,badge,badgeBg,badgeColor,pulse})=>(
    <button onClick={onClick} style={{background:active?`${color}18`:"transparent",border:"none",borderRadius:9,padding:"8px 11px",color:active?color:"rgba(255,255,255,0.42)",fontSize:13,fontWeight:active?700:400,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",transition:"all 0.13s"}}>
      <span>{label}</span>
      {badge>0&&<span className={pulse?"teams-pulse":""} style={{background:badgeBg||"rgba(255,255,255,0.07)",color:badgeColor||"rgba(255,255,255,0.6)",border:pulse?"1px solid rgba(79,142,247,0.4)":"none",borderRadius:7,padding:"1px 6px",fontSize:11,fontWeight:700}}>{badge}</span>}
    </button>
  );

  return (
    <div style={{height:"100vh",background:"linear-gradient(140deg,#0a0c12 0%,#10131e 55%,#0d0f18 100%)",display:"flex",overflow:"hidden"}}>
      {/* SIDEBAR */}
      <div style={{width:215,flexShrink:0,background:"rgba(255,255,255,0.022)",borderRight:"1px solid rgba(255,255,255,0.065)",padding:"24px 11px",display:"flex",flexDirection:"column",gap:3,overflowY:"auto"}}>
        <div style={{paddingLeft:8,marginBottom:20}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#fff"}}>Note<span style={{color:"#4F8EF7"}}>Flow</span></div>
          <div style={{color:"rgba(255,255,255,0.28)",fontSize:10,marginTop:2,fontFamily:"'DM Mono',monospace"}}>capture · organize · find</div>
        </div>
        <SBBtn onClick={()=>{setView("notes");setFolder("all");}} active={view==="notes"&&folder==="all"} color="#4F8EF7" label="📋 All Notes" badge={notes.length}/>
        <SBBtn onClick={()=>setView("teams")} active={view==="teams"} color="#4F8EF7" label="🔵 Teams Inbox" badge={teamsBadge} badgeBg="rgba(79,142,247,0.25)" badgeColor="#4F8EF7" pulse={teamsBadge>0}/>
        <SBBtn onClick={()=>setView("account")} active={view==="account"} color={overdueCount>0?"#FF4F4F":"#FFD700"} label={`${overdueCount>0?"⚠":"⏳"} Follow-ups`} badge={openCount} badgeBg={overdueCount>0?"rgba(255,79,79,0.25)":"rgba(255,200,0,0.2)"} badgeColor={overdueCount>0?"#FF4F4F":"#FFD700"}/>
        <div style={{color:"rgba(255,255,255,0.16)",fontSize:9,letterSpacing:1.3,fontFamily:"'DM Mono',monospace",padding:"9px 11px 3px",textTransform:"uppercase"}}>Folders</div>
        {CATS.map(cat=>(
          <button key={cat.id} onClick={()=>{setFolder(cat.id);setView("notes");}} style={{background:folder===cat.id&&view==="notes"?`${cat.color}16`:"transparent",border:"none",borderRadius:9,padding:"8px 11px",color:folder===cat.id&&view==="notes"?cat.color:"rgba(255,255,255,0.42)",fontSize:13,fontWeight:folder===cat.id&&view==="notes"?700:400,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",transition:"all 0.13s"}}>
            <span>{cat.icon} {cat.label}</span>
            {cc(cat.id)>0&&<span style={{background:`${cat.color}20`,color:cat.color,borderRadius:7,padding:"1px 6px",fontSize:11,fontWeight:700}}>{cc(cat.id)}</span>}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{background:"rgba(255,255,255,0.035)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"9px 11px",marginBottom:6}}>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:5,textTransform:"uppercase"}}>My Name</div>
          {editName?(<div style={{display:"flex",gap:5}}><input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="Your name…" onKeyDown={e=>{if(e.key==="Enter"){saveStr(MY_NAME_KEY,myName);setEditName(false);}}} style={{...INP,fontSize:11,padding:"5px 8px",flex:1}}/><button onClick={()=>{saveStr(MY_NAME_KEY,myName);setEditName(false);}} style={{background:"#4F8EF7",border:"none",borderRadius:7,color:"#fff",fontSize:11,padding:"5px 8px"}}>✓</button></div>)
          :(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#4F8EF7",fontSize:12,fontWeight:700}}>{myName||"Not set"}</span><button onClick={()=>setEditName(true)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:11}}>edit</button></div>)}
        </div>
        <div style={{background:"rgba(255,255,255,0.035)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"9px 11px",marginBottom:6}}>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:5,textTransform:"uppercase"}}>Alert Email</div>
          {editEmail?(<div style={{display:"flex",gap:5}}><input type="email" value={myEmail} onChange={e=>setMyEmail(e.target.value)} placeholder="you@gmail.com" onKeyDown={e=>{if(e.key==="Enter"){saveStr(MY_EMAIL_KEY,myEmail);setEditEmail(false);}}} style={{...INP,fontSize:11,padding:"5px 8px",flex:1}}/><button onClick={()=>{saveStr(MY_EMAIL_KEY,myEmail);setEditEmail(false);}} style={{background:"#4F8EF7",border:"none",borderRadius:7,color:"#fff",fontSize:11,padding:"5px 8px"}}>✓</button></div>)
          :(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#4FC68A",fontSize:11,fontWeight:700,wordBreak:"break-all"}}>{myEmail||"Not set"}</span><button onClick={()=>setEditEmail(true)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:11,flexShrink:0}}>edit</button></div>)}
        </div>
        <div style={{background:"rgba(79,198,138,0.07)",border:"1px solid rgba(79,198,138,0.13)",borderRadius:9,padding:"7px 11px"}}>
          <div style={{color:"#4FC68A",fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>☁ CLOUD + TEAMS</div>
          <div style={{color:"rgba(255,255,255,0.28)",fontSize:10,marginTop:1,fontFamily:"'DM Mono',monospace"}}>Mon–Fri 8am + Fri 5pm alerts</div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {loading?(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.3)",fontSize:14}}>Loading your notes…</div>)

        :view==="teams"?(
          <>
            <div style={{padding:"18px 22px 14px",borderBottom:"1px solid rgba(255,255,255,0.055)",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1}}>
                <h1 style={{color:"#fff",fontSize:18,fontFamily:"'Playfair Display',serif"}}>🔵 Teams Inbox</h1>
                <div style={{color:"rgba(255,255,255,0.28)",fontSize:11,marginTop:1}}>{teamsBadge>0?`${teamsBadge} meeting${teamsBadge>1?"s":""} waiting for review`:"No pending Teams imports"}</div>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 22px"}}>
              {notes.filter(n=>n.source==="teams").length===0?(
                <div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",marginTop:60}}>
                  <div style={{fontSize:40,marginBottom:12}}>🔵</div>
                  <div style={{fontSize:15}}>No Teams meetings yet</div>
                  <div style={{fontSize:12,marginTop:6,opacity:0.7,maxWidth:320,margin:"8px auto 0"}}>Once Power Automate is set up, your Teams meeting summaries will appear here automatically after each meeting ends.</div>
                  <div style={{marginTop:20,background:"rgba(79,142,247,0.07)",border:"1px solid rgba(79,142,247,0.15)",borderRadius:12,padding:"14px 18px",maxWidth:380,margin:"20px auto 0",textAlign:"left"}}>
                    <div style={{color:"#4F8EF7",fontSize:12,fontWeight:700,marginBottom:8}}>Setup checklist:</div>
                    <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,lineHeight:2}}>① Supabase webhook function deployed<br/>② Power Automate flow created<br/>③ Webhook URL added to Power Automate<br/>④ Test meeting completed</div>
                  </div>
                </div>
              ):notes.filter(n=>n.source==="teams").map(note=>(
                <div key={note.id} className="note-row" style={{background:!note.teams_reviewed?"rgba(79,142,247,0.06)":"rgba(255,255,255,0.03)",border:`1px solid ${!note.teams_reviewed?"rgba(79,142,247,0.25)":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer"}} onClick={()=>!note.teams_reviewed&&setTeamsNote(note)}>
                  <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"space-between"}}>
                    <div>
                      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:5}}>
                        <span style={{color:"#4F8EF7",fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>🔵 TEAMS</span>
                        {!note.teams_reviewed&&<span style={{background:"rgba(79,142,247,0.2)",color:"#4F8EF7",borderRadius:6,padding:"1px 8px",fontSize:10,fontWeight:700}}>NEEDS REVIEW</span>}
                        {note.teams_reviewed&&<span style={{color:"rgba(255,255,255,0.25)",fontSize:10}}>reviewed</span>}
                      </div>
                      <div style={{color:"#fff",fontSize:13,fontWeight:600}}>{note.topic||"Untitled Meeting"}</div>
                      <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:3}}>{note.date&&`📅 ${fmtDate(note.date)}`}{note.people&&` · 👤 ${note.people}`}</div>
                    </div>
                    {!note.teams_reviewed&&<button onClick={e=>{e.stopPropagation();setTeamsNote(note);}} style={{background:"linear-gradient(135deg,#4F8EF7,#7B5CF7)",border:"none",borderRadius:10,color:"#fff",padding:"8px 14px",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>Review →</button>}
                  </div>
                </div>
              ))}
            </div>
          </>

        ):view==="account"?(
          <>
            <div style={{padding:"18px 22px 14px",borderBottom:"1px solid rgba(255,255,255,0.055)",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1}}>
                <h1 style={{color:"#fff",fontSize:18,fontFamily:"'Playfair Display',serif"}}>Follow-up Accountability</h1>
                <div style={{color:"rgba(255,255,255,0.28)",fontSize:11,marginTop:1}}>{overdueCount>0?`⚠ ${overdueCount} overdue`:openCount>0?`${openCount} open`:"All clear"}</div>
              </div>
              <button onClick={()=>setModal("new")} style={{background:"linear-gradient(135deg,#4F8EF7,#7B5CF7)",border:"none",borderRadius:13,padding:"9px 17px",color:"#fff",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6,boxShadow:"0 4px 16px rgba(79,142,247,0.3)"}}>✏️ New Note</button>
            </div>
            <AccountPanel notes={notes} myName={myName} onToggleFU={handleToggleFU}/>
          </>

        ):(
          <>
            <div style={{padding:"18px 22px 14px",borderBottom:"1px solid rgba(255,255,255,0.055)",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <h1 style={{color:"#fff",fontSize:18,fontFamily:"'Playfair Display',serif"}}>{folder==="all"?"All Notes":CATS.find(c=>c.id===folder)?.label}</h1>
                <div style={{color:"rgba(255,255,255,0.28)",fontSize:11,marginTop:1}}>{filtered.length} note{filtered.length!==1?"s":""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.055)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:11,padding:"7px 12px",gap:7,minWidth:170}}>
                <span style={{fontSize:13,opacity:0.4}}>🔍</span>
                <input value={sText} onChange={e=>setSText(e.target.value)} placeholder="Search all notes…" style={{background:"transparent",border:"none",color:"#fff",fontSize:13,width:"100%"}}/>
                {sText&&<button onClick={()=>setSText("")} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:13,padding:0}}>✕</button>}
              </div>
              <button onClick={()=>setShowF(s=>!s)} style={{background:showF?"rgba(79,142,247,0.18)":"rgba(255,255,255,0.055)",border:`1px solid ${showF?"rgba(79,142,247,0.4)":"rgba(255,255,255,0.09)"}`,borderRadius:11,padding:"7px 13px",color:showF?"#4F8EF7":"rgba(255,255,255,0.45)",fontSize:13,display:"flex",alignItems:"center",gap:5}}>
                🎛 Filters {(sDate||sPeople||sTopic)&&<span style={{background:"#4F8EF7",color:"#fff",borderRadius:999,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>!</span>}
              </button>
              <button onClick={()=>setModal("new")} style={{background:"linear-gradient(135deg,#4F8EF7,#7B5CF7)",border:"none",borderRadius:13,padding:"9px 17px",color:"#fff",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6,boxShadow:"0 4px 16px rgba(79,142,247,0.3)",whiteSpace:"nowrap"}}>✏️ New Note</button>
            </div>
            {showF&&(
              <div style={{padding:"11px 22px",borderBottom:"1px solid rgba(255,255,255,0.055)",background:"rgba(255,255,255,0.018)",display:"flex",gap:11,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div><Label c="Date"/><input type="date" value={sDate} onChange={e=>setSDate(e.target.value)} style={{...INP,width:155,fontSize:12,padding:"7px 10px"}}/></div>
                <div><Label c="People"/><input value={sPeople} onChange={e=>setSPeople(e.target.value)} placeholder="Name…" style={{...INP,width:160,fontSize:12,padding:"7px 10px"}}/></div>
                <div><Label c="Topic"/><input value={sTopic} onChange={e=>setSTopic(e.target.value)} placeholder="Topic…" style={{...INP,width:160,fontSize:12,padding:"7px 10px"}}/></div>
                {(sDate||sPeople||sTopic)&&<button onClick={()=>{setSDate("");setSPeople("");setSTopic("");}} style={{background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.22)",borderRadius:9,padding:"7px 13px",color:"rgba(255,100,100,0.75)",fontSize:12,alignSelf:"flex-end"}}>Clear</button>}
              </div>
            )}
            <div style={{flex:1,overflowY:"auto",padding:"16px 22px"}}>
              {filtered.length===0?(<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",marginTop:60}}><div style={{fontSize:36,marginBottom:10}}>📝</div><div style={{fontSize:14}}>No notes found</div><div style={{fontSize:11,marginTop:4}}>Tap New Note to get started</div></div>)
              :filtered.map(note=><NoteCard key={note.id} note={note} onDelete={setDelTarget} onMove={handleMove} onToggleFU={handleToggleFU} onEdit={n=>setModal(n)} myName={myName}/>)}
            </div>
          </>
        )}
      </div>

      {toast&&<div className="toast-anim" style={{position:"fixed",bottom:26,left:"50%",background:"rgba(79,198,138,0.95)",color:"#fff",borderRadius:12,padding:"8px 18px",fontSize:13,fontWeight:700,zIndex:300,boxShadow:"0 4px 20px rgba(79,198,138,0.4)",display:"flex",alignItems:"center",gap:7,pointerEvents:"none"}}>{toast}</div>}
      {modal&&<NoteModal initial={modal==="new"?null:modal} onSave={handleSave} onClose={()=>setModal(null)}/>}
      {delTarget&&<DeleteModal note={delTarget} onConfirm={confirmDelete} onCancel={()=>setDelTarget(null)}/>}
      {teamsNote&&<TeamsModal note={teamsNote} onSave={handleTeamsSave} onDismiss={handleTeamsDismiss}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
